<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Teste de API de Conversas</h1>
    <button onclick="testLogin()">Login</button>
    <button onclick="testConversations()">Testar Conversas</button>
    <div id="result"></div>

    <script>
        let token = null;

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                const data = await response.json();
                console.log('Login response:', data);
                
                if (data.access_token) {
                    token = data.access_token;
                    document.getElementById('result').innerHTML = '<p>Login successful! Token saved.</p>';
                } else {
                    document.getElementById('result').innerHTML = '<p>Login failed: ' + JSON.stringify(data) + '</p>';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('result').innerHTML = '<p>Login error: ' + error.message + '</p>';
            }
        }

        async function testConversations() {
            if (!token) {
                document.getElementById('result').innerHTML = '<p>Please login first!</p>';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/messages/conversations', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });

                const data = await response.json();
                console.log('Conversations response:', data);
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                console.error('Conversations error:', error);
                document.getElementById('result').innerHTML = '<p>Conversations error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
